services:
  mongo:
    image: mongo:7
    container_name: gigflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: gigflow-server
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    container_name: gigflow-client
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mongo_data:
